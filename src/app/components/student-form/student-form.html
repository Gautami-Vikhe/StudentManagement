<div class="container">
  <h2>{{ isEditMode ? 'Edit Student' : 'Add New Student' }}</h2>

  <div class="form-group">
    <label>Name</label>
    <input type="text" [(ngModel)]="student.name" placeholder="Enter name" />
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="student.email" placeholder="Enter email" />
  </div>

  <div class="form-group">
    <label>Phone</label>
    <input type="text" [(ngModel)]="student.phone" placeholder="Enter phone" />
  </div>

  <div class="form-group">
    <label>Course</label>
    <input type="text" [(ngModel)]="student.course" placeholder="Enter course" />
  </div>

  <div class="buttons">
    <button (click)="saveStudent()">{{ isEditMode ? 'Update' : 'Save' }}</button>
    <button class="cancel" (click)="cancel()">Cancel</button>
  </div>
</div>
