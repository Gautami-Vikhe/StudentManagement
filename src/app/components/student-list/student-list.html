<div class="container">
  <h2>Student Management System</h2>

  <button (click)="addStudent()">Add New Student</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Course</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.phone }}</td>
        <td>{{ student.course }}</td>
        <td>
          <button (click)="editStudent(student.id!)">Edit</button>
          <button (click)="deleteStudent(student.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="students.length === 0">No students found.</p>
</div>
